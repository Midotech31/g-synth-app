services:
  gsynth:
    build: .
    image: gsynth:3.0.1
    container_name: gsynth
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
